services:
  haiku-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: haiku-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-Haiku@Dev2024!}"
      MSSQL_PID: Developer
    ports:
      - "${DB_PORT:-1433}:1433"
    volumes:
      - haiku-db-data:/var/opt/mssql
      - ./deploy/db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./deploy/db/seed-data.sql:/docker-entrypoint-initdb.d/seed-data.sql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD:-Haiku@Dev2024!}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  haiku-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIG:-Release}
    container_name: haiku-web
    ports:
      - "${WEB_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: Server=haiku-db,1433;Database=Haiku;User Id=sa;Password=${SA_PASSWORD:-Haiku@Dev2024!};TrustServerCertificate=True;
    depends_on:
      haiku-db:
        condition: service_healthy

volumes:
  haiku-db-data:
